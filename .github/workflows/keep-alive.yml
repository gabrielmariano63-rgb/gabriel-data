name: Keep Supabase Alive

on:
  schedule:
    # Toda quarta-feira às 12:00 UTC (09:00 horário de Brasília)
    - cron: '0 12 * * 3'
  workflow_dispatch: # permite rodar manualmente pelo GitHub também

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (gera atividade no banco)
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/app_data?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" -ge 400 ]; then
            echo "Ping falhou com status $STATUS"
            exit 1
          fi
