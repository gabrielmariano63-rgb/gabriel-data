name: Keep Supabase Alive

on:
  schedule:
    # Toda quarta-feira às 12:00 UTC (09:00 horário de Brasília)
    - cron: '0 12 * * 3'
  workflow_dispatch: # permite rodar manualmente pelo GitHub também

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase (gera atividade no banco)
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/app_data?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" -ge 400 ]; then
            echo "Ping falhou com status $STATUS"
            exit 1
          fi

      - name: Registrar execução (mantém o repositório ativo p/ o cron não ser desativado)
        run: |
          mkdir -p .keepalive
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive/last-ping.txt
          git config user.name "keep-alive-bot"
          git config user.email "actions@github.com"
          git add .keepalive/last-ping.txt
          git diff --cached --quiet || git commit -m "chore: keep-alive ping $(date -u +%F)"
          git push
